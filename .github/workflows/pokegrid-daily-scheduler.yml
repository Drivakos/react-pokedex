name: Daily PokéGrid Generation

on:
  # Run daily at 23:30 UTC (generates tomorrow's grid)
  schedule:
    - cron: '30 23 * * *'
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD) - leave empty for tomorrow'
        required: false
        type: string
      days_ahead:
        description: 'Days ahead to generate (default: 1)'
        required: false
        type: number
        default: 1

jobs:
  generate-daily-grid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate grid configurations
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Calculate target date (tomorrow by default, or specified date)
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.target_date }}"
          else
            TARGET_DATE=$(date -d 'tomorrow' +%Y-%m-%d)
          fi

          # Calculate days ahead (default 1, or specified)
          DAYS_AHEAD="${{ github.event.inputs.days_ahead || 1 }}"

          echo "🎯 Generating PokéGrid for date: $TARGET_DATE"
          echo "📅 Days ahead: $DAYS_AHEAD"

          # Run the generation script
          node scripts/generate-daily-grids.js $DAYS_AHEAD

      - name: Verify generation success
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Test that the grid was generated by calling the API
          TARGET_DATE=$(date -d 'tomorrow' +%Y-%m-%d)

          echo "🔍 Verifying grid generation for $TARGET_DATE..."

          # Call Supabase RPC to check if grid exists
          RESPONSE=$(curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_pokegrid_configuration" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"p_grid_date\": \"$TARGET_DATE\"}")

          if echo "$RESPONSE" | grep -q "grid_date"; then
            echo "✅ Grid successfully generated for $TARGET_DATE"
          else
            echo "❌ Grid generation failed for $TARGET_DATE"
            echo "Response: $RESPONSE"
            exit 1
          fi

  deploy-edge-function:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy pokegrid-scheduler --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Verify Edge Function deployment
        run: |
          # Test the edge function endpoint
          RESPONSE=$(curl -s "${{ secrets.SUPABASE_URL }}/functions/v1/pokegrid-scheduler?action=get_daily_status" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          if echo "$RESPONSE" | grep -q "status"; then
            echo "✅ Edge Function deployed successfully"
          else
            echo "❌ Edge Function deployment failed"
            echo "Response: $RESPONSE"
            exit 1
          fi