[build]
  command = "npm run build:prod"
  publish = "dist"
  functions = "netlify/functions"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ./src/"

[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"

# Ensure assets are served with correct MIME types
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

# General security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = """
       default-src 'self';
       script-src 'self' 'sha256-Z2/iFzh9VMlVkEOar1f/oSHWwQk3ve1qk/C2WdsC4Xk=';
       style-src 'self' 'sha256-Nqnn8clbgv+5l0PgxcTOldg8mkMKrFn4TvPL+rYUUGg=' 'sha256-13vrThxdyT64GcXoTNGVoRRoL0a7EGBmOJ+lemEWyws=' 'sha256-QZ52fjvWgIOIOPr+gRIJZ7KjzNeTBm50Z+z9dH4N1/8=' 'sha256-yOU6eaJ75xfag0gVFUvld5ipLRGUy94G17B1uL683EU=' 'sha256-OpTmykz0m3o5HoX53cykwPhUeU4OECxHQlKXpB0QJPQ=' 'sha256-SSIM0kI/u45y4gqkri9aH+la6wn2R+xtcBj3Lzh7qQo=' 'sha256-ZH/+PJIjvP1BctwYxclIuiMu1wItb0aasjpXYXOmU0Y=' 'sha256-58jqDtherY9NOM+ziRgSqQY0078tAZ+qtTBjMgbM9po=' 'sha256-7Ri/I+PfhgtpcL7hT4A0VJKI6g3pK0ZvIN09RQV4ZhI=' 'sha256-uEvq29Gia+5yISklLH7mdEEjErdiBONR1Jd+xZ6k+3E=' 'sha256-O+dNMIawgFeaXkzGkCpSH4HBc/bMAuZg/3E7NFwYHyA=';
       img-src 'self' data: https://raw.githubusercontent.com https://images.pokemontcg.io/ https://*.googleusercontent.com https://*.googleapis.com;
       font-src 'self' data:;
       connect-src 'self' https://kefcxvcbpadksfizrckw.supabase.co https://beta.pokeapi.co https://api.pokemontcg.io https://pokeapi.co;
       object-src 'none';
       base-uri 'self';
       form-action 'self';
       frame-ancestors 'none';
       upgrade-insecure-requests;
     """
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With"
    Access-Control-Max-Age = "86400"
    X-RateLimit-Limit = "1000"
    X-RateLimit-Window = "1m"
    Origin-Agent-Cluster = "?1"
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"

# Development headers (only applies to dev server, not production)
[dev]
  command = "npm run dev"
  port = 5173

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Make sure assets are never redirected
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = false

# API redirects to Netlify Functions
[[redirects]]
  from = "/api/pokemon/graphql"
  to = "/.netlify/functions/pokemon-graphql"
  status = 200
  force = false

[[redirects]]
  from = "/api/pokemon/rest/*"
  to = "/.netlify/functions/pokemon-rest/:splat"
  status = 200
  force = false

# Redirect www to non-www version
[[redirects]]
  from = "https://www.react-pokedex.netlify.app/*"
  to = "https://react-pokedex.netlify.app/:splat"
  status = 301
  force = true

# Handle SPA routing for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Enable brotli compression for better performance
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true
